name: Bug report
description: Report reproducible OpenClaw Quick Replies behavior.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private chat identifiers, or sensitive message text.
  - type: input
    id: versions
    attributes:
      label: Versions
      description: OpenClaw, plugin, Node.js, and operating-system versions.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and reproduction
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs or diagnostics
      render: shell
