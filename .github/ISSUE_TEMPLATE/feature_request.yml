name: Feature request
description: Propose a scoped improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Security, privacy, and channel-contract impact
    validations:
      required: true
